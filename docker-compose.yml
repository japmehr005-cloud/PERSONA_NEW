version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: persona
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  node-api:
    build: ./backend/node-api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/persona
      REDIS_URL: redis://redis:6379
      PYTHON_API_URL: http://python-api:8000
      JWT_SECRET: change_this_secret
      JWT_REFRESH_SECRET: change_this_refresh_secret
      PORT: 3001
    depends_on:
      - postgres
      - redis

  python-api:
    build: ./backend/python-api
    ports:
      - "8000:8000"
    environment:
      NODE_API_URL: http://node-api:3001

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_NODE_API_URL: http://localhost:3001/api
      VITE_PYTHON_API_URL: http://localhost:8000
    depends_on:
      - node-api
      - python-api

volumes:
  pgdata:
